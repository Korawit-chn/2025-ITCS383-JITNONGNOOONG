name: CI Pipeline

on:
  push:
    branches: [ "main", "features", "master"]
  pull_request:

jobs:
  build:
    name: Build + Test + Sonar
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18   

      - name: Install dependencies
        run: npm install
        working-directory: implementations

      - name: Run tests
        run: npm test || echo "No tests"
        working-directory: implementations

      # 🔥 SonarCloud (สำคัญ)
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        with:
          projectBaseDir: .
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}